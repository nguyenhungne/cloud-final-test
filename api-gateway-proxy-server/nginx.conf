events {
    worker_connections 1024;
}

http {
    # Upstream servers
    upstream web_frontend {
        server web-frontend-server:80;
        server web-frontend-server2:80;
    }

    upstream app_backend {
        server application-backend-server:8081;
    }

    upstream auth_server {
        server authentication-identity-server:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Proxy headers configuration
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Location: / - Proxy to web-frontend-server
        location / {
            proxy_pass http://web_frontend;
            add_header X-Upstream-Server $upstream_addr always;
        }

        # Location: /api/ - Proxy to application-backend-server (strip prefix)
        location /api/ {
            proxy_pass http://app_backend/;
        }

        # Location: /keycloak/ - Proxy to authentication-identity-server
        location /keycloak/ {
            proxy_pass http://auth_server/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Location: /student/ - Proxy to application-backend-server /student endpoint
        location /student/ {
            proxy_pass http://app_backend/student;
        }
    }
}
